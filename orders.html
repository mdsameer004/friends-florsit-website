<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Friends Florist</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .page-header {
            padding: 100px 0 60px;
            text-align: center;
            background-color: var(--color-light-pink);
            margin-bottom: 40px;
        }
        
        .orders-container {
            max-width: 900px;
            margin: 0 auto 80px;
        }

        .order-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .order-header {
            background: var(--color-light-green);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
        }

        .order-info {
            display: flex;
            gap: 30px;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
        }

        .info-label {
            color: var(--color-text-light);
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 600;
            color: var(--color-text-main);
        }

        .order-status {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-processing { background: #fff3cd; color: #856404; }
        .status-shipped { background: #cce5ff; color: #004085; }
        .status-delivered { background: #d4edda; color: #155724; }

        .order-body {
            padding: 30px;
        }

        .order-item-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed var(--color-border);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 20px;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .item-meta {
            color: var(--color-text-light);
            font-size: 0.9rem;
        }
        
        .item-price {
            font-weight: 600;
            color: var(--color-dark-green);
        }

        .empty-orders {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--border-radius);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .order-info {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    
    <div id="navbar-container"></div>

    <main>
        <header class="page-header">
            <div class="container">
                <h1 class="section-title">My Orders</h1>
                <p>Track your recent floral deliveries</p>
            </div>
        </header>

        <section class="container orders-container" id="orders-list">
            <!-- Populated by JS -->
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('orders-list');
            const orders = JSON.parse(localStorage.getItem('friendsFloristOrders')) || [];

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <div class="empty-icon">📦</div>
                        <h2 style="font-family: var(--font-heading); color: var(--color-dark-green); margin-bottom: 15px;">No orders found</h2>
                        <p style="color: var(--color-text-light); margin-bottom: 30px;">You haven't placed any orders with us yet.</p>
                        <a href="shop.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            let html = '';
            orders.forEach(order => {
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `
                        <li class="order-item">
                            <img src="${item.image}" alt="${item.name}" class="item-img">
                            <div class="item-details">
                                <div class="item-name">${item.name}</div>
                                <div class="item-meta">Qty: ${item.quantity} | ₹${item.price.toLocaleString('en-IN')} each</div>
                            </div>
                            <div class="item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                        </li>
                    `;
                });

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-info">
                                <div class="info-block">
                                    <span class="info-label">Order ID</span>
                                    <span class="info-value">#${order.id}</span>
                                </div>
                                <div class="info-block">
                                    <span class="info-label">Date Placed</span>
                                    <span class="info-value">${order.date}</span>
                                </div>
                                <div class="info-block">
                                    <span class="info-label">Total Amount</span>
                                    <span class="info-value">₹${order.total.toLocaleString('en-IN')}</span>
                                </div>
                            </div>
                            <div class="order-status status-${order.status.toLowerCase()}">${order.status}</div>
                        </div>
                        <div class="order-body">
                            <h4 style="margin-bottom: 20px; font-size: 1.1rem; color: var(--color-dark-green);">Order Items</h4>
                            <ul class="order-item-list">
                                ${order.items.map(item => `
                                    <li class="order-item">
                                        <img src="${item.image}" alt="${item.name}" class="item-img">
                                        <div class="item-details">
                                            <div class="item-name">${item.name}</div>
                                            <div class="item-meta">Qty: ${item.quantity} | ₹${item.price.toLocaleString('en-IN')} each</div>
                                            ${order.status === 'Delivered' ? `
                                                <button class="btn-review" onclick="openReviewModal(${item.id}, '${item.name.replace(/'/g, "\\'")}')">Write a Review</button>
                                            ` : ''}
                                        </div>
                                        <div class="item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                                    </li>
                                `).join('')}
                            </ul>
                            <div style="text-align: right;">
                                <button class="btn btn-secondary" style="font-size: 0.8rem; padding: 8px 20px;" onclick="alert('Viewing receipt for ${order.id}')">View Receipt</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        });

        function openReviewModal(productId, productName) {
            const modalHtml = `
                <div id="review-modal" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:1000;">
                    <div style="background:white; padding:40px; border-radius:15px; width:100%; max-width:500px; position:relative;">
                        <button onclick="closeReviewModal()" style="position:absolute; top:20px; right:20px; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
                        <h2 style="font-family: var(--font-heading); color: var(--color-dark-green); margin-bottom: 20px;">Review ${productName}</h2>
                        <div style="margin-bottom:20px;">
                            <p style="margin-bottom:10px; font-weight:600;">Rating:</p>
                            <div id="star-rating" style="font-size:2rem; cursor:pointer; color:#ddd;">
                                <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
                            </div>
                            <input type="hidden" id="selected-rating" value="0">
                        </div>
                        <div style="margin-bottom:20px;">
                            <p style="margin-bottom:10px; font-weight:600;">Your Review:</p>
                            <textarea id="review-text" style="width:100%; height:120px; padding:15px; border-radius:8px; border:1px solid #ddd; font-family:var(--font-body);" placeholder="Share your experience..."></textarea>
                        </div>
                        <button class="btn btn-primary" style="width:100%;" onclick="submitReview(${productId})">Submit Review</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function closeReviewModal() {
            const modal = document.getElementById('review-modal');
            if (modal) modal.remove();
        }

        function setRating(val) {
            document.getElementById('selected-rating').value = val;
            const stars = document.getElementById('star-rating').children;
            for(let i=0; i<stars.length; i++) {
                stars[i].style.color = i < val ? '#f39c12' : '#ddd';
            }
        }

        function submitReview(productId) {
            const rating = parseInt(document.getElementById('selected-rating').value);
            const text = document.getElementById('review-text').value;
            
            if (rating === 0) {
                alert('Please select a rating');
                return;
            }
            if (text.trim().length < 5) {
                alert('Please write a slightly longer review');
                return;
            }

            const allReviews = JSON.parse(localStorage.getItem('friendsFloristReviews')) || {};
            if (!allReviews[productId]) {
                // Pre-populate with mock data if it's the first real review
                allReviews[productId] = [
                    { name: "Jane D.", rating: 5, text: "Perfect quality! Arrived exactly when expected.", date: "2026-03-01" },
                    { name: "Mark T.", rating: 4, text: "Beautiful arrangement, very fresh.", date: "2026-02-28" }
                ];
            }

            allReviews[productId].unshift({
                name: "Customer Review", // In a real app, this would be the logged-in user's name
                rating: rating,
                text: text,
                date: new Date().toISOString().split('T')[0]
            });

            localStorage.setItem('friendsFloristReviews', JSON.stringify(allReviews));
            alert('Thank you for your review!');
            closeReviewModal();
            location.reload();
        }
    </script>
</body>
</html>
